<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExcelMind RAG | Query your Data</title>
    <meta name="description" content="A premium RAG application to query your Excel files using Groq and FAISS.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-container">
        <header>
            <h1>ExcelMind <span>RAG</span></h1>
            <p>Upload your spreadsheet and unlock insights with Groq AI</p>
        </header>

        <main>
            <section id="setup-section" class="card">
                <div class="input-group">
                    <label for="api-key">Groq API Key</label>
                    <input type="password" id="api-key" placeholder="gsk_..." autocomplete="off">
                </div>
                
                <div class="upload-area" id="drop-zone">
                    <input type="file" id="file-input" hidden accept=".xlsx, .xls">
                    <div class="upload-content">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                        </svg>
                        <p>Drag & drop your Excel file or <span>browse</span></p>
                    </div>
                </div>
                <div id="file-status" class="status-msg"></div>
            </section>

            <section id="chat-section" class="card hidden">
                <div id="chat-history" class="chat-history">
                    <div class="msg system">Ready! Ask me anything about your data.</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="user-input" placeholder="What's the total revenue?">
                    <button id="send-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </section>
        </main>

        <footer>
            <p>Powered by Groq & FAISS</p>
        </footer>
    </div>

    <div class="blobs">
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
